<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diagnosis and Remedies</title>
    <style>
        /* General body styling */
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        h1 {
            color: #4CAF50;
            margin-bottom: 20px;
        }

        p {
            font-size: 18px;
            margin: 10px 0;
        }

        .remedy-box {
            background-color: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            margin-bottom: 20px;
            width: 90%;
            max-width: 600px;
            text-align: justify;
        }

        .translator {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        select, button {
            margin: 10px;
            padding: 10px;
            font-size: 16px;
            border-radius: 5px;
            border: 1px solid #ddd;
            width: 200px;
        }

        textarea {
            width: 90%;
            max-width: 1200px; /* Increased max width */
            height: 200px;
            margin: 10px 0;
            padding: 10px;
            font-size: 16px;
            border-radius: 5px;
            border: 1px solid #ddd;
            resize: none;
        }

        a {
            display: inline-block;
            text-decoration: none;
            color: white;
            background-color: #4CAF50;
            padding: 10px 20px;
            border-radius: 5px;
            font-size: 16px;
            margin-top: 20px;
        }

        a:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <h1>Diagnosis and Remedies</h1>

    <div class="remedy-box">
        <h2>{{ disease_name }}</h2>
        <p>{{ remedies }}</p>
    </div>

    <div class="translator">
        <h3>Translate Remedies</h3>
        <textarea id="remedyText">{{ remedies }}</textarea>
<select id="language">
    <option value="kn">Kannada</option>
    <option value="hi">Hindi</option>
    <option value="te">Telugu</option>
    <option value="ta">Tamil</option>
    <option value="ml">Malayalam</option>
</select>

        <button onclick="translateText()">Translate</button>
        <textarea id="translatedText" readonly></textarea>
    </div>

    <a href="/starter">Back to Home</a>

    <script>
        function translateText() {
            const text = document.getElementById("remedyText").value;
            const targetLang = document.getElementById("language").value;

            fetch('/translate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text: text, target_language: targetLang })
            })
            .then(response => response.json())
            .then(data => {
                document.getElementById("translatedText").value = data.translated_text;
            })
            .catch(error => {
                console.error("Error during translation:", error);
                alert("Translation failed. Please try again.");
            });
        }
    </script>
</body>
</html>
